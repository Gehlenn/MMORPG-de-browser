<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eldoria - MMORPG de Browser</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="screen">
    <div class="login-container">
        <div class="login-box">
            <h1>🎮 MMORPG - Eldoria</h1>
            <p class="login-subtitle">Entre no mundo fantástico</p>
            
            <div class="form-group">
                <input id="username" class="form-input" placeholder="Nome de Usuário">
            </div>
            
            <div class="form-group">
                <input id="password" type="password" class="form-input" placeholder="Senha">
            </div>
            
            <button id="loginBtn" class="login-button">🔑 Entrar no Mundo</button>
            <button id="createAccountBtn" class="create-account">👥 Criar Nova Conta</button>
            
            <p id="loginMessage" class="message"></p>
        </div>
    </div>
</div>

<!-- CHARACTER SCREEN -->
<div id="characterScreen" class="screen" style="display:none">
    <div class="character-container">
        <div class="character-box">
            <h2>👥 Selecionar Personagem</h2>
            <p class="character-subtitle">Escolha seu herói</p>
            
            <div id="characterList" class="character-list">
                <!-- Characters will be loaded here -->
            </div>
            
            <button id="createCharacterBtn" class="create-character">+ Criar Novo Personagem</button>
            <button id="enterWorldBtn" class="login-button">🌍 Entrar no Mundo</button>
            <button id="backToLoginBtn" class="login-button">← Voltar ao Login</button>
            
            <p id="characterMessage" class="message"></p>
        </div>
    </div>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="screen" style="display:none">
    <div id="game-ui">
        <div class="ui-panel">
            <div class="player-info">
                <span id="playerName">Player</span>
                <span id="playerLevel">Lv. 1</span>
            </div>
            <div class="health-bar">
                <div class="health-fill" id="healthFill"></div>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
