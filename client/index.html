<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MMORPG de Browser</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-shell">
    <header class="topbar">
        <h1>MMORPG de Browser</h1>
        <div class="topbar-right">
            <label class="preset-label" for="viewportPreset">Resolucao:</label>
            <select id="viewportPreset">
                <option value="auto">Auto</option>
                <option value="1366x768">1366x768</option>
                <option value="1920x1080">1920x1080</option>
            </select>
            <div id="sessionInfo" class="session-info">Offline</div>
        </div>
    </header>

    <section id="loginScreen" class="screen card visible">
        <h2>Conta</h2>
        <p>Entre ou crie sua conta local.</p>
        <div class="tab-row tab-row-2">
            <button id="showLoginBtn" class="active" type="button">Login</button>
            <button id="showRegisterBtn" type="button">Criar Conta</button>
        </div>

        <form id="loginForm" class="form-grid">
            <label>Login
                <input id="loginUser" type="text" minlength="3" required>
            </label>
            <label>Senha
                <input id="loginPass" type="password" minlength="3" required>
            </label>
            <button type="submit">Entrar</button>
        </form>

        <form id="registerForm" class="form-grid hidden">
            <label>Login
                <input id="registerUser" type="text" minlength="3">
            </label>
            <label>Email
                <input id="registerEmail" type="email">
            </label>
            <label>Senha
                <input id="registerPass" type="password" minlength="3">
            </label>
            <button type="submit">Criar Conta</button>
        </form>

        <button id="googleFutureBtn" type="button">Google Login (em breve)</button>
    </section>

    <section id="characterScreen" class="screen card">
        <h2>Criacao de Personagem</h2>
        <form id="characterForm" class="form-grid">
            <label>Nome do Heroi
                <input id="heroName" type="text" minlength="3" maxlength="18" required>
            </label>
            <label>Raca
                <select id="raceSelect"></select>
            </label>
            <label>Classe
                <select id="classSelect"></select>
            </label>
            <button type="submit">Criar e Jogar</button>
        </form>
        <div id="classPreview" class="preview"></div>
    </section>

    <section id="gameScreen" class="screen">
        <div class="layout">
            <aside class="left-column card">
                <h3>Navegacao</h3>
                <div class="direction-grid">
                    <button data-dir="north">Norte</button>
                    <button data-dir="west">Oeste</button>
                    <button data-dir="south">Sul</button>
                    <button data-dir="east">Leste</button>
                </div>
                <h4>Entradas proximas</h4>
                <div id="entryButtons" class="stack"></div>
                <h4>Quests</h4>
                <div id="questList" class="stack"></div>
            </aside>

            <main class="center-column card">
                <div class="location-head">
                    <div>
                        <strong id="locationName">Cidade Inicial</strong>
                        <p id="locationDesc"></p>
                    </div>
                    <button id="rotateImageBtn" type="button">Girar imagem</button>
                </div>
                <img id="locationImage" alt="Imagem do ambiente">
                <div class="canvas-wrap"><canvas id="gameCanvas" width="800" height="480"></canvas></div>

                <div class="log-toolbar">
                    <div class="log-filters">
                        <button data-log-filter="all" class="active" type="button">Tudo</button>
                        <button data-log-filter="combat" type="button">Combate</button>
                        <button data-log-filter="quest" type="button">Quest</button>
                        <button data-log-filter="loot" type="button">Loot</button>
                    </div>
                    <button id="logClearBtn" type="button">Limpar</button>
                </div>
                <div id="log" class="log"></div>
            </main>

            <aside class="right-column card">
                <h3>Personagem</h3>
                <div id="stats"></div>
                <div class="tab-row tab-row-3">
                    <button id="tabInventory" class="active">Inventario</button>
                    <button id="tabEquipment">Equipamentos</button>
                    <button id="tabAchievements">Conquistas</button>
                </div>
                <div id="inventoryPanel"></div>
                <div id="equipmentPanel" class="hidden"></div>
                <div id="achievementsPanel" class="hidden"></div>

                <div class="social-block">
                    <h4>Friends</h4>
                    <div class="friend-add">
                        <input id="friendInput" type="text" placeholder="Nome do amigo">
                        <button id="addFriendBtn" type="button">Adicionar</button>
                    </div>
                    <div id="friendList" class="stack"></div>
                    <h4>Party</h4>
                    <div class="tab-row tab-row-2">
                        <button id="togglePartyCloseBtn" type="button">Party Aberta</button>
                        <button id="leavePartyBtn" type="button">Sair da Party</button>
                    </div>
                    <div id="partyInfo" class="small"></div>
                    <div id="partyList" class="stack"></div>
                </div>

                <div id="cityServices" class="services hidden">
                    <h4>Cidade Inicial</h4>
                    <div class="stack">
                        <button data-service="tavern">Taverna</button>
                        <button data-service="board">Quadro de Missoes</button>
                        <button data-service="hunt">Quadro de Hunt</button>
                        <button data-service="dungeon">Portal de Dungeon</button>
                        <button data-service="rest">Descansar (5 ouro)</button>
                        <button data-service="market">Mercado</button>
                    </div>
                </div>

                <div id="marketPanel" class="market hidden"></div>
            </aside>
        </div>
    </section>
</div>

<script src="map.js"></script>
<script src="game.js"></script>
</body>
</html>
