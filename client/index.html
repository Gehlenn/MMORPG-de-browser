
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Browser MMORPG</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>⚔ Browser MMORPG</h1>

<div id="stats"></div>

<h2>Map</h2>

<button onclick="travel('Village')">Village</button>
<button onclick="travel('Forest')">Forest</button>
<button onclick="travel('Cave')">Cave</button>
<button onclick="travel('Mountain')">Mountain</button>

<h2>Hunt</h2>

<button onclick="hunt('goblin')">Goblin</button>
<button onclick="hunt('wolf')">Wolf</button>
<button onclick="hunt('orc')">Orc</button>

<h2>Inventory</h2>
<div id="inventory"></div>

<h2>Log</h2>
<div id="log"></div>

<script src="game.js"></script>

</body>
</html>
