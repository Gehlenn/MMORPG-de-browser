<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Browser MMORPG V3</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>⚔ Browser MMORPG V3</h1>

<div id="ui">
    <div class="panel">
        <h2>Personagem</h2>
        <div id="stats"></div>
        <div id="raceSelector" class="chips"></div>
    </div>

    <div class="panel">
        <h2>Área Atual</h2>
        <img id="locationImage" alt="Imagem da área"/>
        <div id="travelButtons" class="chips"></div>
    </div>

    <div class="panel">
        <h2>Inventário</h2>
        <div id="inventory"></div>
    </div>
</div>

<canvas id="gameCanvas" width="800" height="500"></canvas>
<div id="log"></div>

<script src="map.js"></script>
<script src="game.js"></script>
</body>
</html>
