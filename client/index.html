<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eldoria - MMORPG de Browser</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .screen {
            display: none;
        }
        
        /* Mostrar tela de login por padrão */
        #loginScreen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        #characterScreen, #gameScreen {
            display: none;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            min-width: 400px;
        }
        
        .login-title {
            color: #fff;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        
        .login-subtitle {
            color: #aaa;
            margin-bottom: 30px;
        }
        
        .form-input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        .form-input::placeholder {
            color: #888;
        }
        
        .login-button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.4);
        }
        
        .create-account {
            background: linear-gradient(45deg, #2196F3, #1976D2);
        }
        
        .create-account:hover {
            box-shadow: 0 5px 20px rgba(33, 150, 243, 0.4);
        }
        
        .message {
            color: #fff;
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
        }
        
        .message.error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
        }
        
        .message.success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4CAF50;
        }
        
        .character-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        
        .character-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid transparent;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        
        .character-card:hover {
            border-color: #4CAF50;
            transform: translateY(-2px);
        }
        
        .character-card.selected {
            border-color: #2196F3;
            background: rgba(33, 150, 243, 0.1);
        }
        
        .character-name {
            color: #fff;
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .character-info {
            color: #aaa;
            font-size: 0.9em;
        }
        
        .character-creation {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .form-row {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        
        .form-row .form-input {
            flex: 1;
        }
        
        #game-ui {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        
        #gameCanvas {
            border: 2px solid #4CAF50;
            border-radius: 10px;
            display: block;
            margin: 0 auto;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .ui-panel {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #4CAF50;
            border-radius: 10px;
            padding: 15px;
            color: white;
            font-family: Arial, sans-serif;
        }
        
        .health-bar {
            width: 200px;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin: 5px 0;
        }
        
        .health-fill {
            height: 100%;
            background: linear-gradient(45deg, #4CAF50, #45a049);
            transition: width 0.3s;
        }
        
        .chat-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 300px;
            max-height: 200px;
        }
        
        .chat-messages {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #4CAF50;
            border-radius: 10px;
            padding: 10px;
            height: 150px;
            overflow-y: auto;
            font-family: Arial, sans-serif;
            font-size: 12px;
        }
        
        .chat-input-container {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }
        
        .chat-input {
            flex: 1;
            padding: 5px;
            border: 1px solid #4CAF50;
            border-radius: 5px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
        }
        
        .chat-send {
            padding: 5px 10px;
            border: 1px solid #4CAF50;
            border-radius: 5px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="screen">
        <div class="login-container">
            <h1>� Eldoria MMORPG</h1>
            <div id="loginMessage" class="message"></div>
            
            <div class="form-row">
                <input type="text" id="username" class="form-input" placeholder="Nome de usuário">
            </div>
            <div class="form-row">
                <input type="password" id="password" class="form-input" placeholder="Senha">
            </div>
            <div class="form-row">
                <button id="loginBtn" class="login-button">Entrar</button>
                <button id="createAccountBtn" class="login-button create-account">Criar Conta</button>
            </div>
        </div>
    </div>

    <!-- CHARACTER SCREEN -->
    <div id="characterScreen" class="screen">
        <div class="character-container">
            <h2>� Seleção de Personagem</h2>
            <div id="characterMessage" class="message"></div>
            
            <div class="form-row">
                <input type="text" id="characterName" class="form-input" placeholder="Nome do personagem">
            </div>
            <div class="form-row">
                <select id="characterRace" class="form-input">
                    <option value="human">Humano</option>
                    <option value="elf">Elfo</option>
                    <option value="dwarf">Anão</option>
                </select>
            </div>
            <div class="form-row">
                <select id="characterClass" class="form-input">
                    <option value="warrior">Guerreiro</option>
                    <option value="mage">Mago</option>
                    <option value="ranger">Rastreador</option>
                </select>
            </div>
            <div class="form-row">
                <button id="createCharacterBtn" class="login-button create-account">Criar Personagem</button>
            </div>
            
            <button id="enterWorldBtn" class="login-button">Entrar no Mundo</button>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="gameScreen" class="screen">
        <div id="game-ui">
            <!-- Game Canvas -->
            <canvas id="gameCanvas"></canvas>
            
            <!-- HUD Principal -->
            <div class="ui-panel" style="position: absolute; top: 20px; left: 20px;">
                <div id="playerName">Player</div>
                <div id="playerLevel">Lv. 1</div>
                <div class="health-bar">
                    <div id="healthFill" class="health-fill" style="width: 100%;"></div>
                </div>
                <div id="hpText">100/100</div>
                <div id="positionText">400, 300</div>
                <div id="mobCount">0 mobs</div>
                <div id="fpsText">60 FPS</div>
            </div>
            
            <!-- Minimapa -->
            <div class="ui-panel" style="position: absolute; top: 20px; right: 20px;">
                <canvas id="minimap" width="150" height="150" style="border-radius: 5px;"></canvas>
            </div>
            
            <!-- Chat -->
            <div class="chat-container">
                <div id="chatMessages" class="chat-messages"></div>
                <div class="chat-input-container">
                    <input type="text" id="chatInput" class="chat-input" placeholder="Digite mensagem...">
                    <button id="chatSend" class="chat-send">Enviar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="SimpleLoginManager.js"></script>
    <script src="GameplayEngine.js"></script>
    <script src="GameplayTestAgent.js"></script>
    
    <script>
        // Debug: Verificar se os scripts foram carregados
        console.log('🔍 Verificando carregamento dos scripts...');
        
        // Aguardar scripts carregarem
        function waitForScripts() {
            return new Promise((resolve) => {
                const checkInterval = setInterval(() => {
                    if (typeof SimpleLoginManager !== 'undefined' && 
                        typeof GameplayEngine !== 'undefined' && 
                        typeof GameplayTestAgent !== 'undefined') {
                        clearInterval(checkInterval);
                        console.log('✅ Todos os scripts carregados!');
                        resolve();
                    }
                }, 100);
            });
        }
        
        // Inicializar sistemas após carregamento
        waitForScripts().then(() => {
            console.log('SimpleLoginManager disponível:', typeof SimpleLoginManager);
            console.log('GameplayEngine disponível:', typeof GameplayEngine);
            console.log('GameplayTestAgent disponível:', typeof GameplayTestAgent);
            
            // Inicializar sistemas
            const loginManager = new SimpleLoginManager();
            const gameplayEngine = new GameplayEngine();
            const testAgent = new GameplayTestAgent();
            
            console.log('🎮 Sistemas inicializados');
            
            // Sobrescrever startGame para usar GameplayEngine
            loginManager.startGame = function(characterData) {
                console.log('🚀 Iniciando GameplayEngine com:', characterData);
                
                // Esconder tela de personagem
                if (this.characterScreen) {
                    this.characterScreen.style.display = 'none';
                }
                
                // Mostrar tela de jogo
                if (this.gameScreen) {
                    this.gameScreen.style.display = 'flex';
                    console.log('🎮 Tela de jogo exibida');
                }
                
                // Iniciar gameplay
                const success = gameplayEngine.startGame(characterData);
                console.log('🎮 Gameplay iniciado:', success);
                
                if (success) {
                    // Atualizar HUD
                    if (this.playerName) {
                        this.playerName.textContent = characterData.name || 'Player';
                    }
                    if (this.playerLevel) {
                        this.playerLevel.textContent = `Lv. ${characterData.level || 1}`;
                    }
                    
                    // Iniciar testes automáticos após 3 segundos
                    setTimeout(() => {
                        console.log('🤖 INICIANDO TESTES AUTOMÁTICOS...');
                        testAgent.runFullTest();
                    }, 3000);
                }
            };
            
            // Setup eventos
            loginManager.setupEvents();
            
            // Forçar tela de login visível
            document.addEventListener('DOMContentLoaded', () => {
                const loginScreen = document.getElementById('loginScreen');
                if (loginScreen) {
                    loginScreen.style.display = 'flex';
                }
                
                // Botão de teste manual
                const testButton = document.createElement('button');
                testButton.textContent = '🤖 Rodar Teste Automático';
                testButton.style.cssText = `
                    position: fixed;
                    top: 10px;
                    right: 10px;
                    z-index: 10000;
                    background: #FF6B6B;
                    color: white;
                    border: none;
                    padding: 10px 15px;
                    border-radius: 5px;
                    cursor: pointer;
                    font-size: 12px;
                `;
                testButton.onclick = () => {
                    console.log('🤖 TESTE MANUAL INICIADO...');
                    testAgent.runFullTest();
                };
                document.body.appendChild(testButton);
                
                // Iniciar teste automático após 2 segundos
                setTimeout(async () => {
                    console.log('🔥 FORÇANDO LOGIN AUTOMÁTICO PARA TESTE');
                    
                    // Limpar localStorage para teste limpo
                    localStorage.removeItem('eldoria_accounts');
                    localStorage.removeItem('eldoria_characters');
                    localStorage.removeItem('current_user');
                    
                    // Criar conta de teste
                    const testUser = {
                        username: testAgent.testData.username,
                        password: testAgent.testData.password,
                        id: Date.now().toString(),
                        createdAt: new Date().toISOString()
                    };
                    
                    const accounts = JSON.parse(localStorage.getItem('eldoria_accounts') || '{}');
                    accounts[testAgent.testData.username] = testUser;
                    localStorage.setItem('eldoria_accounts', JSON.stringify(accounts));
                    console.log('✅ Conta de teste criada:', testUser);
                    
                    // Simular login
                    loginManager.currentUser = testUser;
                    localStorage.setItem('current_user', testAgent.testData.username);
                    
                    // Ir para tela de personagem
                    if (loginManager.loginScreen) {
                        loginManager.loginScreen.style.display = 'none';
                    }
                    if (loginManager.characterScreen) {
                        loginManager.characterScreen.style.display = 'flex';
                    }
                    
                    // Criar personagem automaticamente
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    
                    const nameInput = document.getElementById('characterName');
                    const raceSelect = document.getElementById('characterRace');
                    const classSelect = document.getElementById('characterClass');
                    const createCharBtn = document.getElementById('createCharacterBtn');
                    
                    if (nameInput && raceSelect && classSelect && createCharBtn) {
                        nameInput.value = testAgent.testData.characterName;
                        raceSelect.value = testAgent.testData.race;
                        classSelect.value = testAgent.testData.class;
                        
                        console.log('👤 Criando personagem automaticamente...');
                        createCharBtn.click();
                        
                        await new Promise(resolve => setTimeout(resolve, 1000));
                        
                        // Entrar no mundo
                        const enterWorldBtn = document.getElementById('enterWorldBtn');
                        if (enterWorldBtn) {
                            console.log('🚀 Entrando no mundo automaticamente...');
                            
                            // Criar personagem data
                            const testCharacter = {
                                name: testAgent.testData.characterName,
                                race: testAgent.testData.race,
                                class: testAgent.testData.class,
                                level: 1,
                                id: Date.now().toString()
                            };
                            
                            loginManager.currentCharacter = testCharacter;
                            loginManager.startGame(testCharacter);
                        }
                    }
                    
                }, 2000);
            });
        });
    </script>
</body>
</html>
