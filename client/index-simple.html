<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eldoria - MMORPG de Browser</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .screen {
            display: none;
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            min-width: 400px;
        }
        
        .login-title {
            color: #fff;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        
        .login-subtitle {
            color: #aaa;
            margin-bottom: 30px;
        }
        
        .form-input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        .form-input::placeholder {
            color: #888;
        }
        
        .login-button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.4);
        }
        
        .create-account {
            background: linear-gradient(45deg, #2196F3, #1976D2);
        }
        
        .create-account:hover {
            box-shadow: 0 5px 20px rgba(33, 150, 243, 0.4);
        }
        
        .message {
            color: #fff;
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
        }
        
        .message.error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
        }
        
        .message.success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4CAF50;
        }
        
        .message.info {
            background: rgba(33, 150, 243, 0.2);
            border: 1px solid #2196F3;
        }
        
        #gameCanvas {
            border: 2px solid #4CAF50;
            border-radius: 10px;
        }
        
        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-family: Arial, sans-serif;
        }
        
        .player-info {
            margin-bottom: 10px;
        }
        
        .health-bar {
            width: 200px;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .health-fill {
            height: 100%;
            background: linear-gradient(45deg, #4CAF50, #45a049);
            width: 100%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="screen" style="display: block;">
    <div class="login-container">
        <div class="login-box">
            <h1 class="login-title">🎮 MMORPG - Eldoria</h1>
            <p class="login-subtitle">Entre no mundo fantástico</p>
            
            <div class="form-group">
                <input id="username" class="form-input" placeholder="Nome de Usuário">
            </div>
            
            <div class="form-group">
                <input id="password" type="password" class="form-input" placeholder="Senha">
            </div>
            
            <button id="loginBtn" class="login-button">🔑 Entrar no Mundo</button>
            <button id="createAccountBtn" class="login-button create-account">👥 Criar Nova Conta</button>
            
            <p id="loginMessage" class="message"></p>
        </div>
    </div>
</div>

<!-- CHARACTER SCREEN -->
<div id="characterScreen" class="screen">
    <div class="login-container">
        <div class="login-box">
            <h2 class="login-title">👥 Selecionar Personagem</h2>
            <p class="login-subtitle">Escolha seu herói</p>
            
            <div id="characterList" style="min-height: 100px; margin: 20px 0;">
                <!-- Characters will be loaded here -->
            </div>
            
            <button id="createCharacterBtn" class="login-button">+ Criar Novo Personagem</button>
            <button id="enterWorldBtn" class="login-button">🌍 Entrar no Mundo</button>
            <button id="backToLoginBtn" class="login-button">← Voltar ao Login</button>
            
            <p id="characterMessage" class="message"></p>
        </div>
    </div>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="screen">
    <div class="ui-panel">
        <div class="player-info">
            <span id="playerName">Player</span>
            <span id="playerLevel">Lv. 1</span>
        </div>
        <div class="health-bar">
            <div class="health-fill" id="healthFill"></div>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<!-- Socket.IO Client -->
<script src="/socket.io/socket.io.js"></script>

<!-- Simplified Game Script -->
<script>
// Debug: Verificar se tudo carregou
console.log('🔍 Debug: Iniciando script...');
console.log('🔍 Socket.IO disponível:', typeof io !== 'undefined');
console.log('🔍 Elementos encontrados:', {
    loginScreen: !!document.getElementById('loginScreen'),
    characterScreen: !!document.getElementById('characterScreen'),
    gameScreen: !!document.getElementById('gameScreen'),
    username: !!document.getElementById('username'),
    password: !!document.getElementById('password'),
    loginBtn: !!document.getElementById('loginBtn'),
    createAccountBtn: !!document.getElementById('createAccountBtn')
});

// LoginManager Simplificado
class SimpleLoginManager {
    constructor() {
        this.currentUser = null;
        this.currentCharacter = null;
        this.setupEvents();
        console.log('✅ SimpleLoginManager inicializado');
    }
    
    setupEvents() {
        const loginBtn = document.getElementById('loginBtn');
        const createBtn = document.getElementById('createAccountBtn');
        const enterWorldBtn = document.getElementById('enterWorldBtn');
        const createCharBtn = document.getElementById('createCharacterBtn');
        const backBtn = document.getElementById('backToLoginBtn');
        
        if (loginBtn) {
            loginBtn.addEventListener('click', () => this.login());
            console.log('✅ Login button event added');
        }
        
        if (createBtn) {
            createBtn.addEventListener('click', () => this.createAccount());
            console.log('✅ Create account button event added');
        }
        
        if (enterWorldBtn) {
            enterWorldBtn.addEventListener('click', () => this.enterWorld());
            console.log('✅ Enter world button event added');
        }
        
        if (createCharBtn) {
            createCharBtn.addEventListener('click', () => this.createCharacter());
            console.log('✅ Create character button event added');
        }
        
        if (backBtn) {
            backBtn.addEventListener('click', () => this.showLogin());
            console.log('✅ Back to login button event added');
        }
    }
    
    showMessage(type, message) {
        const messageEl = document.getElementById('loginMessage');
        if (messageEl) {
            messageEl.textContent = message;
            messageEl.className = `message ${type}`;
        }
    }
    
    showCharacterMessage(type, message) {
        const messageEl = document.getElementById('characterMessage');
        if (messageEl) {
            messageEl.textContent = message;
            messageEl.className = `message ${type}`;
        }
    }
    
    showLogin() {
        document.getElementById('loginScreen').style.display = 'block';
        document.getElementById('characterScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'none';
        this.clearMessages();
    }
    
    showCharacter() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('characterScreen').style.display = 'block';
        document.getElementById('gameScreen').style.display = 'none';
        this.clearMessages();
        this.loadCharacters();
    }
    
    showGame() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('characterScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'block';
        this.clearMessages();
        this.startGame();
    }
    
    clearMessages() {
        const loginMsg = document.getElementById('loginMessage');
        const charMsg = document.getElementById('characterMessage');
        if (loginMsg) loginMsg.textContent = '';
        if (charMsg) charMsg.textContent = '';
    }
    
    login() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        
        if (!username) {
            this.showMessage('error', 'Digite um nome de usuário');
            return;
        }
        
        console.log('🔑 Tentando login:', username);
        this.showMessage('info', 'Conectando...');
        
        // Simular login
        setTimeout(() => {
            this.currentUser = { username, id: Date.now().toString() };
            this.showMessage('success', 'Login successful!');
            setTimeout(() => this.showCharacter(), 1000);
        }, 1000);
    }
    
    createAccount() {
        const username = prompt('Nome de usuário:');
        const password = prompt('Senha:');
        const email = prompt('Email:');
        
        if (username && password && email) {
            console.log('👤 Criando conta:', username);
            this.showMessage('info', 'Criando conta...');
            
            setTimeout(() => {
                this.showMessage('success', 'Conta criada com sucesso!');
                setTimeout(() => this.showLogin(), 2000);
            }, 1000);
        }
    }
    
    loadCharacters() {
        const charList = document.getElementById('characterList');
        if (charList) {
            charList.innerHTML = '<p style="color: #aaa;">Nenhum personagem criado ainda</p>';
        }
    }
    
    createCharacter() {
        const name = prompt('Nome do personagem:');
        if (name) {
            this.currentCharacter = {
                name: name,
                level: 1,
                hp: 100,
                maxHp: 100,
                x: 400,
                y: 300
            };
            console.log('✅ Personagem criado:', name);
            this.loadCharacters();
        }
    }
    
    enterWorld() {
        if (!this.currentCharacter) {
            this.showCharacterMessage('error', 'Crie um personagem primeiro');
            return;
        }
        
        console.log('🌍 Entrando no mundo...');
        this.showGame();
    }
    
    startGame() {
        console.log('🎮 Iniciando jogo...');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // Desenhar tela inicial
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = '#4CAF50';
        ctx.font = '30px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('🎮 Mundo de Eldoria', canvas.width / 2, canvas.height / 2 - 30);
        
        ctx.fillStyle = '#fff';
        ctx.font = '20px Arial';
        ctx.fillText(`Jogador: ${this.currentCharacter.name}`, canvas.width / 2, canvas.height / 2 + 10);
        ctx.fillText('Use WASD para mover', canvas.width / 2, canvas.height / 2 + 40);
        
        // Atualizar UI
        const playerName = document.getElementById('playerName');
        const playerLevel = document.getElementById('playerLevel');
        if (playerName) playerName.textContent = this.currentCharacter.name;
        if (playerLevel) playerLevel.textContent = `Lv. ${this.currentCharacter.level}`;
    }
}

// Inicializar
const loginManager = new SimpleLoginManager();
console.log('🚀 Sistema inicializado com sucesso!');

// Global para debug
window.loginManager = loginManager;
</script>

</body>
</html>
