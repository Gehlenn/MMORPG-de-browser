<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MMORPG - Eldoria</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: linear-gradient(135deg, #1a1a2e 0%, #0f172a 100%); 
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
        }
        
        /* Login Screen Styles */
        .login-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            z-index: 1000;
        }
        
        .login-box {
            background: rgba(30, 41, 59, 0.9);
            border: 2px solid #3b82f6;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
            min-width: 400px;
        }
        
        .login-title {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #3b82f6;
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }
        
        .login-subtitle {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #e2e8f0;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #374151;
            border-radius: 8px;
            background: #1f2937;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .login-button {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }
        
        .login-button:hover {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
        }
        
        .login-button:disabled {
            background: #374151;
            cursor: not-allowed;
            transform: none;
        }
        
        .create-account {
            color: #60a5fa;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }
        
        .create-account:hover {
            color: #3b82f6;
            text-decoration: underline;
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 15px;
            color: #fca5a5;
            font-size: 14px;
        }
        
        .success-message {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid #22c55e;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 15px;
            color: #86efac;
            font-size: 14px;
        }
        
        /* Character Selection Screen */
        .character-selection {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            z-index: 999;
        }
        
        .character-box {
            background: rgba(30, 41, 59, 0.9);
            border: 2px solid #8b5cf6;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
            min-width: 500px;
        }
        
        .character-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #8b5cf6;
        }
        
        .character-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .character-card {
            background: #1f2937;
            border: 2px solid #374151;
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .character-card:hover {
            border-color: #8b5cf6;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.2);
        }
        
        .character-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #e2e8f0;
        }
        
        .character-level {
            font-size: 14px;
            color: #9ca3af;
        }
        
        .create-character {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            border: none;
            border-radius: 8px;
            color: white;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .create-character:hover {
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
            transform: translateY(-2px);
        }
        
        /* Game Screen */
        .game-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            background: #000;
        }
        
        canvas { 
            display: block; 
        }
        
        #game-ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            z-index: 100;
        }
        
        .ui-panel {
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            min-width: 200px;
        }
        
        .hidden {
            display: none !important;
        }
        
        /* Garantir que loginScreen apareça por padrão */
        #loginScreen {
            display: flex !important;
            visibility: visible !important;
            opacity: 1 !important;
            z-index: 1000 !important;
        }
        
        #characterScreen {
            display: none !important;
        }
        
        #gameScreen {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-container">
        <div class="login-box">
            <div class="login-title">⚔️ Eldoria</div>
            <div class="login-subtitle">Bem-vindo ao continente perdido</div>
            
            <div id="loginMessage"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">Nome de Usuário</label>
                    <input type="text" id="username" class="form-input" placeholder="Digite seu nome de usuário" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Senha</label>
                    <input type="password" id="password" class="form-input" placeholder="Digite sua senha" required>
                </div>
                
                <button type="submit" class="login-button" id="loginButton">Entrar no Mundo</button>
                
                <a href="#" class="create-account" id="createAccountLink">Criar Nova Conta</a>
            </form>
        </div>
    </div>
    
    <!-- Character Selection Screen -->
    <div id="characterScreen" class="character-selection">
        <div class="character-box">
            <div class="character-title">👥 Selecionar Personagem</div>
            <div id="characterMessage"></div>
            
            <div class="character-list" id="characterList">
                <!-- Characters will be loaded here -->
            </div>
            
            <button class="create-character" id="createCharacterButton">+ Criar Novo Personagem</button>
            <button class="login-button" id="backToLoginButton">← Voltar ao Login</button>
        </div>
    </div>
    
    <!-- Game Screen -->
    <div id="gameScreen" class="game-screen">
        <div id="game-ui">
            <div class="ui-panel">
                <div>Player: <span id="player-name">-</span></div>
                <div>Health: <span id="player-health">-</span></div>
                <div>Level: <span id="player-level">-</span></div>
                <div>XP: <span id="player-xp">-</span></div>
                <div>Mobs: <span id="mob-count">-</span></div>
            </div>
            <div class="ui-panel">
                <div>Position: (<span id="player-x">-</span>, <span id="player-y">-</span>)</div>
                <div>Controls: WASD to move, Click to attack</div>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>
    
    <!-- Scripts -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="Player.js"></script>
    <script src="entities/Mob.js"></script>
    <script src="Input.js"></script>
    <script src="engine/MapRenderer.js"></script>
    <script src="storage-manager.js"></script>
    <script src="login-system.js"></script>
    <script src="test-agent.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
