<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eldoria - MMORPG de Browser</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .screen {
            display: none;
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            min-width: 400px;
        }
        
        .login-title {
            color: #fff;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        
        .login-subtitle {
            color: #aaa;
            margin-bottom: 30px;
        }
        
        .form-input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        .form-input::placeholder {
            color: #888;
        }
        
        .login-button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.4);
        }
        
        .create-account {
            background: linear-gradient(45deg, #2196F3, #1976D2);
        }
        
        .create-account:hover {
            box-shadow: 0 5px 20px rgba(33, 150, 243, 0.4);
        }
        
        .message {
            color: #fff;
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
        }
        
        .message.error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
        }
        
        .message.success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4CAF50;
        }
        
        .message.info {
            background: rgba(33, 150, 243, 0.2);
            border: 1px solid #2196F3;
        }
        
        #gameCanvas {
            border: 2px solid #4CAF50;
            border-radius: 10px;
        }
        
        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-family: Arial, sans-serif;
        }
        
        .player-info {
            margin-bottom: 10px;
        }
        
        .health-bar {
            width: 200px;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .health-fill {
            height: 100%;
            background: linear-gradient(45deg, #4CAF50, #45a049);
            width: 100%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="screen" style="display: block;">
    <div class="login-container">
        <div class="login-box">
            <h1 class="login-title">🎮 MMORPG - Eldoria</h1>
            <p class="login-subtitle">Entre no mundo fantástico</p>
            
            <div class="form-group">
                <input id="username" class="form-input" placeholder="Nome de Usuário">
            </div>
            
            <div class="form-group">
                <input id="password" type="password" class="form-input" placeholder="Senha">
            </div>
            
            <button id="loginBtn" class="login-button">🔑 Entrar no Mundo</button>
            <button id="createAccountBtn" class="login-button create-account">👥 Criar Nova Conta</button>
            
            <p id="loginMessage" class="message"></p>
        </div>
    </div>
</div>

<!-- CHARACTER SCREEN -->
<div id="characterScreen" class="screen">
    <div class="login-container">
        <div class="login-box">
            <h2 class="login-title">👥 Selecionar Personagem</h2>
            <p class="login-subtitle">Escolha seu herói</p>
            
            <div id="characterList" style="min-height: 100px; margin: 20px 0;">
                <!-- Characters will be loaded here -->
            </div>
            
            <button id="createCharacterBtn" class="login-button">+ Criar Novo Personagem</button>
            <button id="enterWorldBtn" class="login-button">🌍 Entrar no Mundo</button>
            <button id="backToLoginBtn" class="login-button">← Voltar ao Login</button>
            
            <p id="characterMessage" class="message"></p>
        </div>
    </div>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="screen">
    <div id="game-ui">
        <!-- HUD Principal -->
        <div class="ui-panel" style="position: absolute; top: 20px; left: 20px; background: rgba(0, 0, 0, 0.8); padding: 15px; border-radius: 10px; color: white; font-family: Arial, sans-serif; min-width: 200px;">
            <div class="player-info" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <span id="playerName" style="font-weight: bold; font-size: 16px;">Player</span>
                <span id="playerLevel" style="color: #FFD700; font-size: 14px;">Lv. 1</span>
            </div>
            <div class="health-bar" style="width: 100%; height: 20px; background: #333; border-radius: 10px; overflow: hidden; margin-bottom: 5px;">
                <div class="health-fill" id="healthFill" style="height: 100%; background: linear-gradient(45deg, #4CAF50, #45a049); width: 100%; transition: width 0.3s;"></div>
            </div>
            <div style="font-size: 12px; color: #aaa; text-align: center;">
                <span id="hpText">100/100 HP</span>
            </div>
        </div>
        
        <!-- Minimapa -->
        <div class="ui-panel" style="position: absolute; top: 20px; right: 20px; background: rgba(0, 0, 0, 0.8); padding: 10px; border-radius: 10px; border: 2px solid #4CAF50;">
            <canvas id="minimap" width="150" height="150" style="border-radius: 5px;"></canvas>
        </div>
        
        <!-- Controles -->
        <div class="ui-panel" style="position: absolute; bottom: 20px; left: 20px; background: rgba(0, 0, 0, 0.8); padding: 15px; border-radius: 10px; color: white; font-family: Arial, sans-serif;">
            <div style="font-size: 14px; margin-bottom: 5px;">🎮 Controles</div>
            <div style="font-size: 12px; color: #aaa;">
                <div>W/A/S/D - Mover</div>
                <div>ESP - Menu</div>
                <div>Click - Interagir</div>
            </div>
        </div>
        
        <!-- Status -->
        <div class="ui-panel" style="position: absolute; bottom: 20px; right: 20px; background: rgba(0, 0, 0, 0.8); padding: 15px; border-radius: 10px; color: white; font-family: Arial, sans-serif;">
            <div style="font-size: 14px; margin-bottom: 5px;">📊 Status</div>
            <div style="font-size: 12px; color: #aaa;">
                <div>Pos: <span id="positionText">400, 300</span></div>
                <div>Mobs: <span id="mobCount">8</span></div>
                <div>FPS: <span id="fpsText">60</span></div>
            </div>
        </div>
        
        <!-- Chat -->
        <div class="ui-panel" style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.8); padding: 10px; border-radius: 10px; color: white; font-family: Arial, sans-serif; max-width: 400px;">
            <div id="chatMessages" style="font-size: 12px; max-height: 100px; overflow-y: auto; margin-bottom: 5px;">
                <div style="color: #4CAF50;">🌍 Bem-vindo ao mundo de Eldoria!</div>
            </div>
            <div style="display: flex; gap: 5px;">
                <input id="chatInput" type="text" placeholder="Digite mensagem..." style="flex: 1; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 5px; padding: 5px; color: white; font-size: 12px;">
                <button id="chatSend" style="background: #4CAF50; border: none; border-radius: 5px; padding: 5px 10px; color: white; font-size: 12px; cursor: pointer;">Enviar</button>
            </div>
        </div>
        
        <!-- Game Canvas -->
        <canvas id="gameCanvas"></canvas>
    </div>
</div>

<!-- Socket.IO Client -->
<script src="/socket.io/socket.io.js"></script>

<!-- Simplified Game Script -->
<script>
// Debug: Verificar se tudo carregou
console.log('🔍 Debug: Iniciando script...');
console.log('🔍 Socket.IO disponível:', typeof io !== 'undefined');
console.log('🔍 Elementos encontrados:', {
    loginScreen: !!document.getElementById('loginScreen'),
    characterScreen: !!document.getElementById('characterScreen'),
    gameScreen: !!document.getElementById('gameScreen'),
    username: !!document.getElementById('username'),
    password: !!document.getElementById('password'),
    loginBtn: !!document.getElementById('loginBtn'),
    createAccountBtn: !!document.getElementById('createAccountBtn')
});

// LoginManager Simplificado
class SimpleLoginManager {
    constructor(game) {
        this.game = game;
        this.currentUser = null;
        this.currentCharacter = null;
        
        // Inicializar elementos das telas
        this.loginScreen = document.getElementById('loginScreen');
        this.characterScreen = document.getElementById('characterScreen');
        this.gameScreen = document.getElementById('gameScreen');
        
        console.log('🔍 Telas encontradas:', {
            loginScreen: !!this.loginScreen,
            characterScreen: !!this.characterScreen,
            gameScreen: !!this.gameScreen
        });
        
        this.setupEvents();
        console.log('✅ SimpleLoginManager inicializado');
    }
    
    setupEvents() {
        const loginBtn = document.getElementById('loginBtn');
        const createBtn = document.getElementById('createAccountBtn');
        const enterWorldBtn = document.getElementById('enterWorldBtn');
        const createCharBtn = document.getElementById('createCharacterBtn');
        const backBtn = document.getElementById('backToLoginBtn');
        
        if (loginBtn) {
            loginBtn.addEventListener('click', () => this.login());
            console.log('✅ Login button event added');
        }
        
        if (createBtn) {
            createBtn.addEventListener('click', () => this.createAccount());
            console.log('✅ Create account button event added');
        }
        
        if (enterWorldBtn) {
            enterWorldBtn.addEventListener('click', () => this.enterWorld());
            console.log('✅ Enter world button event added');
        }
        
        if (createCharBtn) {
            createCharBtn.addEventListener('click', () => this.createCharacter());
            console.log('✅ Create character button event added');
        }
        
        if (backBtn) {
            backBtn.addEventListener('click', () => this.showLogin());
            console.log('✅ Back to login button event added');
        }
    }
    
    showMessage(type, message) {
        const messageEl = document.getElementById('loginMessage');
        if (messageEl) {
            messageEl.textContent = message;
            messageEl.className = `message ${type}`;
        }
    }
    
    showCharacterMessage(type, message) {
        const messageEl = document.getElementById('characterMessage');
        if (messageEl) {
            messageEl.textContent = message;
            messageEl.className = `message ${type}`;
        }
    }
    
    showLogin() {
        if (this.loginScreen) {
            this.loginScreen.style.display = 'block';
        }
        if (this.characterScreen) {
            this.characterScreen.style.display = 'none';
        }
        if (this.gameScreen) {
            this.gameScreen.style.display = 'none';
        }
        this.clearMessages();
    }
    
    showCharacter() {
        console.log('👥 Showing character screen');
        if (this.loginScreen) {
            this.loginScreen.style.display = "none";
        }
        if (this.characterScreen) {
            this.characterScreen.style.display = "block";
        }
        if (this.gameScreen) {
            this.gameScreen.style.display = "none";
        }
        this.clearMessages();
        this.loadCharacters();
        
        // Adicionar botão de limpar personagens
        this.addClearCharactersButton();
    }
    
        showGame() {
        console.log('🎮 Iniciando transição para tela de jogo...');
        
        // Limpar qualquer canvas existente
        const existingCanvas = document.getElementById('gameCanvas');
        if (existingCanvas) {
            existingCanvas.remove();
        }
        
        // Ocultar todas as telas primeiro
        if (this.loginScreen) {
            this.loginScreen.style.display = 'none';
        }
        if (this.characterScreen) {
            this.characterScreen.style.display = 'none';
        }
        if (this.gameScreen) {
            this.gameScreen.style.display = 'block';
        }
        
        this.clearMessages();
        
        // Pequeno delay para garantir renderização correta
        setTimeout(() => {
            this.startGame();
        }, 100);
    }
    
    addClearCharactersButton() {
        // Verificar se já existe o botão
        if (document.getElementById('clearCharsBtn')) {
            return;
        }
        
        const charScreen = document.getElementById('characterScreen');
        const clearBtn = document.createElement('button');
        clearBtn.id = 'clearCharsBtn';
        clearBtn.className = 'login-button';
        clearBtn.textContent = '🗑️ Limpar Todos Personagens';
        clearBtn.style.cssText = `
            position: absolute;
            top: 20px;
            right: 20px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 15px;
            font-size: 12px;
            cursor: pointer;
            z-index: 1000;
        `;
        
        clearBtn.addEventListener('click', () => {
            if (confirm('Tem certeza que deseja deletar TODOS os personagens? Esta ação não pode ser desfeita!')) {
                this.clearAllCharacters();
            }
        });
        
        charScreen.appendChild(clearBtn);
    }
    
    clearAllCharacters() {
        try {
            // Limpar do localStorage
            const characters = JSON.parse(localStorage.getItem('eldoria_characters') || '{}');
            delete characters[this.currentUser.username];
            localStorage.setItem('eldoria_characters', JSON.stringify(characters));
            
            console.log('🗑️ Todos os personagens deletados para:', this.currentUser.username);
            this.showCharacterMessage('success', 'Todos os personagens foram deletados!');
            
            // Recarregar lista
            this.loadCharacters();
        } catch (error) {
            console.error('❌ Erro ao deletar personagens:', error);
            this.showCharacterMessage('error', 'Erro ao deletar personagens');
        }
    }
    
    showGame() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('characterScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'block';
        this.clearMessages();
        this.startGame();
    }
    
    clearMessages() {
        const loginMsg = document.getElementById('loginMessage');
        const charMsg = document.getElementById('characterMessage');
        if (loginMsg) loginMsg.textContent = '';
        if (charMsg) charMsg.textContent = '';
    }
    
    login() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        
        if (!username) {
            this.showMessage('error', 'Digite um nome de usuário');
            return;
        }
        
        console.log('🔑 Tentando login:', username);
        this.showMessage('info', 'Conectando...');
        
        // Simular login
        setTimeout(() => {
            this.currentUser = { username, id: Date.now().toString() };
            this.showMessage('success', 'Login successful!');
            setTimeout(() => this.showCharacter(), 1000);
        }, 1000);
    }
    
    createAccount() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        
        if (!username || !password) {
            this.showMessage('error', 'Preencha usuário e senha para criar conta');
            return;
        }
        
        // Gerar email automaticamente
        const email = `${username}@eldoria.com`;
        
        console.log('👤 Criando conta:', username);
        this.showMessage('info', 'Criando conta...');
        
        // Simular criação de conta
        setTimeout(() => {
            // Salvar no localStorage
            const accounts = JSON.parse(localStorage.getItem('eldoria_accounts') || '{}');
            
            if (accounts[username]) {
                this.showMessage('error', 'Nome de usuário já existe');
                return;
            }
            
            const newAccount = {
                username: username,
                password: password,
                email: email,
                createdAt: new Date().toISOString(),
                id: Date.now().toString()
            };
            
            accounts[username] = newAccount;
            localStorage.setItem('eldoria_accounts', JSON.stringify(accounts));
            
            console.log('✅ Account created successfully');
            this.showMessage('success', 'Conta criada com sucesso!');
            
            setTimeout(() => {
                this.showMessage('info', 'Faça login com sua nova conta');
            }, 2000);
        }, 1000);
    }
    
    loadCharacters() {
        console.log('🔍 Carregando personagens...');
        console.log('🔍 Usuário atual:', this.currentUser);
        
        const charList = document.getElementById('characterList');
        if (!charList) {
            console.log('❌ charList não encontrado');
            return;
        }
        
        // Obter personagens do localStorage
        console.log('🔍 Buscando no localStorage...');
        const characters = JSON.parse(localStorage.getItem('eldoria_characters') || '{}');
        console.log('🔍 Todos os personagens:', characters);
        
        const userCharacters = characters[this.currentUser?.username] || [];
        console.log('� Personagens do usuário:', userCharacters);
        
        // Limpar lista
        charList.innerHTML = '';
        
        if (userCharacters.length === 0) {
            console.log('🔍 Nenhum personagem encontrado');
            charList.innerHTML = `
                <div style="text-align: center; padding: 40px; color: #aaa;">
                    <div style="font-size: 48px; margin-bottom: 10px;">👤</div>
                    <div style="font-size: 18px; margin-bottom: 10px;">Nenhum personagem criado</div>
                    <div style="font-size: 14px;">Clique abaixo para criar seu primeiro herói</div>
                </div>
            `;
            
            // Desabilitar botão "Entrar no Mundo"
            const enterBtn = document.getElementById('enterWorldBtn');
            if (enterBtn) {
                enterBtn.disabled = true;
                enterBtn.style.opacity = '0.5';
                enterBtn.style.cursor = 'not-allowed';
                enterBtn.textContent = '🔒 Selecione um Personagem';
            }
            return;
        }
        
        console.log('🔍 Encontrados', userCharacters.length, 'personagens');
        
        // Habilitar botão "Entrar no Mundo"
        const enterBtn = document.getElementById('enterWorldBtn');
        if (enterBtn) {
            enterBtn.disabled = false;
            enterBtn.style.opacity = '1';
            enterBtn.style.cursor = 'pointer';
            enterBtn.textContent = '🌍 Entrar no Mundo';
        }
        
        // Criar cards para cada personagem
        userCharacters.forEach((character, index) => {
            console.log('🔍 Criando card para personagem:', character);
            
            const charCard = document.createElement('div');
            charCard.className = 'character-card';
            charCard.style.cssText = `
                background: rgba(255, 255, 255, 0.1);
                border: 2px solid rgba(255, 255, 255, 0.2);
                border-radius: 15px;
                padding: 20px;
                margin: 15px 0;
                cursor: pointer;
                transition: all 0.3s ease;
                position: relative;
                overflow: hidden;
            `;
            
            charCard.innerHTML = `
                <div style="display: flex; align-items: center; gap: 20px;">
                    <div style="width: 60px; height: 60px; background: linear-gradient(45deg, #4CAF50, #45a049); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px;">
                        ${this.getRaceIcon(character.race || 'Humano')}
                    </div>
                    <div style="flex: 1;">
                        <div style="color: #fff; font-size: 20px; font-weight: bold; margin-bottom: 5px;">${character.name}</div>
                        <div style="color: #aaa; font-size: 14px; margin-bottom: 3px;">Level ${character.level} • ${character.class || 'Aprendiz'}</div>
                        <div style="color: #FFD700; font-size: 12px; margin-bottom: 3px;">🎲 ${character.race || 'Humano'}</div>
                        <div style="color: #4CAF50; font-size: 12px;">❤️ ${character.hp}/${character.maxHp} HP</div>
                    </div>
                    <div style="text-align: right;">
                        <div style="color: #FFD700; font-size: 12px; margin-bottom: 5px;">⭐ ${character.level || 1}</div>
                        <div style="color: #888; font-size: 10px;">Criado: ${new Date(character.createdAt || Date.now()).toLocaleDateString()}</div>
                    </div>
                </div>
            `;
            
            // Evento de clique
            charCard.addEventListener('click', () => {
                console.log('🔍 Personagem clicado:', character.name);
                
                // Remover seleção anterior
                document.querySelectorAll('.character-card').forEach(card => {
                    card.style.border = '2px solid rgba(255, 255, 255, 0.2)';
                    card.style.background = 'rgba(255, 255, 255, 0.1)';
                });
                
                // Selecionar este personagem
                charCard.style.border = '3px solid #4CAF50';
                charCard.style.background = 'rgba(76, 175, 80, 0.2)';
                this.currentCharacter = character;
                
                console.log('✅ Personagem selecionado:', character.name);
                this.showCharacterMessage('success', `Personagem ${character.name} selecionado!`);
                
                // Habilitar botão "Entrar no Mundo"
                const enterBtn = document.getElementById('enterWorldBtn');
                if (enterBtn) {
                    enterBtn.disabled = false;
                    enterBtn.style.opacity = '1';
                    enterBtn.style.cursor = 'pointer';
                    enterBtn.textContent = '🌍 Entrar no Mundo';
                }
            });
            
            // Hover effects
            charCard.addEventListener('mouseenter', () => {
                if (this.currentCharacter?.id !== character.id) {
                    charCard.style.background = 'rgba(255, 255, 255, 0.2)';
                    charCard.style.transform = 'translateY(-2px)';
                    charCard.style.boxShadow = '0 5px 20px rgba(255, 255, 255, 0.2)';
                }
            });
            
            charCard.addEventListener('mouseleave', () => {
                if (this.currentCharacter?.id !== character.id) {
                    charCard.style.background = 'rgba(255, 255, 255, 0.1)';
                    charCard.style.transform = 'translateY(0)';
                    charCard.style.boxShadow = 'none';
                }
            });
            
            charList.appendChild(charCard);
            console.log('🔍 Card adicionado ao DOM');
        });
        
        console.log('✅ Carregamento de personagens concluído');
    }
    
    createCharacter() {
        // Criar formulário inline para nome do personagem
        const charList = document.getElementById('characterList');
        
        // Verificar se já existe formulário
        if (document.getElementById('charCreateForm')) {
            return;
        }
        
        const formDiv = document.createElement('div');
        formDiv.id = 'charCreateForm';
        formDiv.style.cssText = `
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.2), rgba(33, 150, 243, 0.2));
            border: 2px solid #4CAF50;
            border-radius: 15px;
            padding: 25px;
            margin: 15px 0;
            animation: slideIn 0.3s ease;
        `;
        
        formDiv.innerHTML = `
            <div style="color: #fff; font-size: 18px; font-weight: bold; margin-bottom: 15px; text-align: center;">
                👥 Criar Novo Personagem
            </div>
            <div style="margin-bottom: 15px;">
                <label style="color: #aaa; font-size: 12px; display: block; margin-bottom: 5px;">Nome do Personagem</label>
                <input id="newCharName" class="form-input" placeholder="Digite o nome..." style="width: 100%; margin-bottom: 10px;">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="color: #aaa; font-size: 12px; display: block; margin-bottom: 5px;">Escolha sua Raça</label>
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">

        let selectedRace = 'Humano';
        
        // Eventos de seleção de raça
        const raceOptions = formDiv.querySelectorAll('.race-option');
        raceOptions.forEach(option => {
            option.addEventListener('click', () => {
                // Remover seleção anterior
                raceOptions.forEach(opt => {
                    opt.style.border = '2px solid transparent';
                    opt.style.background = 'rgba(255, 255, 255, 0.1)';
                });
                
                // Selecionar esta raça
                option.style.border = '2px solid #4CAF50';
                option.style.background = 'rgba(76, 175, 80, 0.2)';
                selectedRace = option.dataset.race;
                
                console.log('🎲 Raça selecionada:', selectedRace);
            });
            
            // Hover effects
            option.addEventListener('mouseenter', () => {
                if (option.dataset.race !== selectedRace) {
                    option.style.background = 'rgba(255, 255, 255, 0.2)';
                    option.style.transform = 'translateY(-2px)';
                }
            });
            
            option.addEventListener('mouseleave', () => {
                if (option.dataset.race !== selectedRace) {
                    option.style.background = 'rgba(255, 255, 255, 0.1)';
                    option.style.transform = 'translateY(0)';
                }
            });
        });
        
        // Selecionar Humano por padrão

        if (defaultRace) {
            defaultRace.style.border = '2px solid #4CAF50';
            defaultRace.style.background = 'rgba(76, 175, 80, 0.2)';
        }

        document.getElementById('confirmCreateChar').addEventListener('click', () => {
            console.log('🔍 Botão Criar Personagem clicado');
            
            const name = document.getElementById('newCharName').value.trim();
            console.log('🔍 Nome digitado:', name);
            
            if (!name) {
                console.log('❌ Nome vazio');
                this.showCharacterMessage('error', 'Digite um nome para o personagem');
                return;
            }
            
            console.log('🔍 Raça selecionada:', selectedRace);
            
            if (!selectedRace) {
                console.log('❌ Raça não selecionada');
                this.showCharacterMessage('error', 'Selecione uma raça');
                return;
            }
            
            // Verificar limite de 4 personagens
            const characters = JSON.parse(localStorage.getItem('eldoria_characters') || '{}');
            const userCharacters = characters[this.currentUser.username] || [];
            
            if (userCharacters.length >= 4) {
                console.log('❌ Limite de personagens atingido');
                this.showCharacterMessage('error', 'Limite de 4 personagens por conta atingido!');
                return;
            }
            
            console.log('🔍 Criando personagem com:', { name, race: selectedRace });
            
            const character = {
                id: Date.now().toString(),
                name: name.trim(),
                level: 1,
                class: 'Aprendiz',
                race: selectedRace,
                hp: 100,
                maxHp: 100,
                x: 400,
                y: 300,
                createdAt: new Date().toISOString()
            };
            
            console.log('🔍 Personagem object:', character);
            
            // Salvar no localStorage
            try {
                console.log('🔍 Salvando no localStorage...');
                
                if (!characters[this.currentUser.username]) {
                    console.log('🔍 Criando array para usuário:', this.currentUser.username);
                    characters[this.currentUser.username] = [];
                }
                
                characters[this.currentUser.username].push(character);
                console.log('🔍 Personagens após adicionar:', characters);
                
                localStorage.setItem('eldoria_characters', JSON.stringify(characters));
                console.log('✅ Salvo no localStorage com sucesso');
                
                // Verificar se foi salvo
                const saved = JSON.parse(localStorage.getItem('eldoria_characters') || '{}');
                console.log('🔍 Verificação do salvamento:', saved[this.currentUser.username]);
                
                console.log('✅ Personagem criado e salvo:', character);
                this.showCharacterMessage('success', `Personagem ${name} (${selectedRace}) criado com sucesso!`);
                
                // Remover formulário
                formDiv.remove();
                
                // Recarregar lista
                this.loadCharacters();
            } catch (error) {
                console.error('❌ Erro ao criar personagem:', error);
                this.showCharacterMessage('error', 'Erro ao criar personagem: ' + error.message);
            }
        });
        
        document.getElementById('cancelCreateChar').addEventListener('click', () => {
            formDiv.remove();
        });
        
        // Submit com Enter
        document.getElementById('newCharName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('confirmCreateChar').click();
            }
        });
    }
    
    // Função auxiliar para obter ícone da classe
    getClassIcon(className) {
        const icons = {
            'Aprendiz': '🎓',
            'Guerreiro': '⚔️',
            'Mago': '🔮',
            'Arqueiro': '🏹',
            'Ladino': '🗡️'
        };
        return icons[className] || '🎓';
    }
    
    // Função auxiliar para obter ícone da raça
    getRaceIcon(raceName) {
        const icons = {
            'Humano': '👤',
            'Elfo': '🧝',
            'Anão': '⛏️',
            'Orc': '👹',
            'Morto-Vivo': '💀',
            'Fada': '🧚'
        };
        return icons[raceName] || '👤';
    }
    
    enterWorld() {
        if (!this.currentCharacter) {
            this.showCharacterMessage('error', 'Selecione um personagem primeiro');
            return;
        }
        
        console.log('🌍 Entrando no mundo com:', this.currentCharacter.name);
        this.showGame();
    }
    
    startGame() {
        console.log('🎮 Iniciando jogo...');
        
        // Criar canvas dinamicamente se não existir
        let canvas = document.getElementById('gameCanvas');
        if (!canvas) {
            canvas = document.createElement('canvas');
            canvas.id = 'gameCanvas';
            document.querySelector('#game-ui').appendChild(canvas);
        }
        
        // Inicializar Gameplay Engine
        if (!window.gameplayEngine) {
            window.gameplayEngine = new GameplayEngine();
        }
        
        // Iniciar gameplay com personagem atual
        const success = window.gameplayEngine.startGame(this.currentCharacter);
        
        if (!success) {
            console.error('❌ Falha ao iniciar gameplay');
            return;
        }
        
        console.log('🎮 Gameplay iniciado com sucesso');
    }

// Criar sprites simples
const sprites = {
    player: {
        draw: (x, y, size) => {
            // Player body (verde)
            ctx.fillStyle = '#4CAF50';
            ctx.fillRect(x - size/2, y - size/2, size, size);
            
            // Player border
            ctx.strokeStyle = '#2E7D32';
            ctx.lineWidth = 2;
            ctx.strokeRect(x - size/2, y - size/2, size, size);
            
            // Player eyes
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(x - 8, y - 8, 6, 6);
            ctx.fillRect(x + 2, y - 8, 6, 6);
            
            // Player pupils
            ctx.fillStyle = '#000000';
            ctx.fillRect(x - 6, y - 6, 3, 3);
            ctx.fillRect(x + 4, y - 6, 3, 3);
        }
    },
    mob: {
        draw: (mob) => {
            // Mob body (vermelho)
            ctx.fillStyle = mob.color;
            ctx.fillRect(mob.x - mob.size/2, mob.y - mob.size/2, mob.size, mob.size);
            
            // Mob border
            ctx.strokeStyle = '#C62828';
            ctx.lineWidth = 2;
            ctx.strokeRect(mob.x - mob.size/2, mob.y - mob.size/2, mob.size, mob.size);
            
            // Mob eyes (angry)
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(mob.x - 8, mob.y - 8, 5, 5);
            ctx.fillRect(mob.x + 3, mob.y - 8, 5, 5);
                playerX = Math.max(playerSize/2, Math.min(canvas.width - playerSize/2, newX));
                playerY = Math.max(playerSize/2, Math.min(canvas.height - playerSize/2, newY));
                
                // Atualizar texto de posição
                if (positionText) {
                    positionText.textContent = `${Math.round(playerX)}, ${Math.round(playerY)}`;
                }
            }
            
            // Ataque com espaço
            if (keys[' ']) {
                keys[' '] = false; // Evitar ataque contínuo
                
                // Verificar colisão com mobs para ataque
                mobs.forEach(mob => {
                    const dist = Math.sqrt(Math.pow(playerX - mob.x, 2) + Math.pow(playerY - mob.y, 2));
                    if (dist < (playerSize + mob.size) / 2 + 20) { // Alcance de ataque
                        // Dano ao mob
                        mob.hp -= 10;
                        addChatMessage(`⚔️ Você atacou ${mob.name}! (-10 HP)`, '#FFD700');
                        
                        if (mob.hp <= 0) {
                            // Mob derrotado
                            addChatMessage(`⚔️ Você derrotou ${mob.name}!`, '#FFD700');
                            // Respawn mob
                            mob.hp = mob.maxHp;
                            mob.x = Math.random() * (canvas.width - 100) + 50;
                            mob.y = Math.random() * (canvas.height - 100) + 50;
                        }
                    }
                });
            }
            
            // Atualizar mobs (movimento aleatório)
            mobs.forEach(mob => {
                // Mudar direção aleatoriamente
                if (Math.random() < 0.01) {
                    mob.direction = Math.random() * Math.PI * 2;
                }
                
                // Mover mob
                const mobMoveX = Math.cos(mob.direction) * mob.speed * deltaTime;
                const mobMoveY = Math.sin(mob.direction) * mob.speed * deltaTime;
                
                mob.x += mobMoveX;
                mob.y += mobMoveY;
                
                // Manter mob dentro dos limites
                if (mob.x < mob.size/2 || mob.x > canvas.width - mob.size/2) {
                    mob.direction = Math.PI - mob.direction;
                    mob.x = Math.max(mob.size/2, Math.min(canvas.width - mob.size/2, mob.x));
                }
                if (mob.y < mob.size/2 || mob.y > canvas.height - mob.size/2) {
                    mob.direction = -mob.direction;
                    mob.y = Math.max(mob.size/2, Math.min(canvas.height - mob.size/2, mob.y));
                }
            });
            
            // Desenhar mobs
            mobs.forEach(mob => {
                sprites.mob.draw(mob);
                
                // Mob HP bar
                const hpPercent = mob.hp / mob.maxHp;
                ctx.fillStyle = '#FF0000';
                ctx.fillRect(mob.x - mob.size/2, mob.y - mob.size/2 - 15, mob.size, 4);
                ctx.fillStyle = '#00FF00';
                ctx.fillRect(mob.x - mob.size/2, mob.y - mob.size/2 - 15, mob.size * hpPercent, 4);
                
                // Mob name
                ctx.fillStyle = '#FFFFFF';
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(mob.name, mob.x, mob.y - mob.size/2 - 20);
            });
            
            // Desenhar player
            sprites.player.draw(playerX, playerY, playerSize);
            
            // Player name
            ctx.fillStyle = '#FFFFFF';
            ctx.font = '14px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(currentCharacter.name, playerX, playerY - playerSize/2 - 5);
            
            // Verificar colisão com mobs
            mobs.forEach(mob => {
                const dist = Math.sqrt(Math.pow(playerX - mob.x, 2) + Math.pow(playerY - mob.y, 2));
                if (dist < (playerSize + mob.size) / 2) {
                    // Colisão!
                    ctx.strokeStyle = '#FFD700';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(mob.x - mob.size/2 - 3, mob.y - mob.size/2 - 3, mob.size + 6, mob.size + 6);
                    
                    // Dano visual
                    ctx.fillStyle = 'rgba(255, 0, 0, 0.3)';
                    ctx.fillRect(playerX - playerSize/2, playerY - playerSize/2, playerSize, playerSize);
                    
                    // Dano ao mob
                    if (keys[' ']) { // Espaço para atacar
                        mob.hp -= 1;
                        if (mob.hp <= 0) {
                            // Mob derrotado
                            addChatMessage(`⚔️ Você derrotou ${mob.name}!`, '#FFD700');
                            // Respawn mob
                            mob.hp = mob.maxHp;
                            mob.x = Math.random() * (canvas.width - 100) + 50;
                            mob.y = Math.random() * (canvas.height - 100) + 50;
                        }
                    }
                }
            });
            
            // Desenhar minimapa
            if (minimapCtx && minimap) {
                const scale = 150 / Math.max(canvas.width, canvas.height);
                
                // Limpar minimapa
                minimapCtx.fillStyle = '#0a0a0a';
                minimapCtx.fillRect(0, 0, 150, 150);
                
                // Desenhar grade no minimapa
                minimapCtx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                minimapCtx.lineWidth = 0.5;
                for (let x = 0; x < 150; x += 15) {
                    minimapCtx.beginPath();
                    minimapCtx.moveTo(x, 0);
                    minimapCtx.lineTo(x, 150);
                    minimapCtx.stroke();
                }
                for (let y = 0; y < 150; y += 15) {
                    minimapCtx.beginPath();
                    minimapCtx.moveTo(0, y);
                    minimapCtx.lineTo(150, y);
                    minimapCtx.stroke();
                }
                
                // Desenhar mobs no minimapa
                minimapCtx.fillStyle = '#FF6B6B';
                mobs.forEach(mob => {
                    minimapCtx.fillRect(mob.x * scale - 1, mob.y * scale - 1, 2, 2);
                });
                
                // Desenhar player no minimapa
                minimapCtx.fillStyle = '#4CAF50';
                minimapCtx.fillRect(playerX * scale - 2, playerY * scale - 2, 4, 4);
            }
            
            // Atualizar HUD
            const playerName = document.getElementById('playerName');
            const playerLevel = document.getElementById('playerLevel');
            const healthFill = document.getElementById('healthFill');
            const hpText = document.getElementById('hpText');
            const positionText = document.getElementById('positionText');
            const mobCount = document.getElementById('mobCount');
            const fpsText = document.getElementById('fpsText');
            
            if (playerName) playerName.textContent = currentCharacter.name;
            if (playerLevel) playerLevel.textContent = `Lv. ${currentCharacter.level}`;
            if (healthFill) {
                const hpPercent = currentCharacter.hp / currentCharacter.maxHp;
                healthFill.style.width = `${hpPercent * 100}%`;
            }
            if (hpText) hpText.textContent = `${currentCharacter.hp}/${currentCharacter.maxHp} HP`;
            if (positionText) positionText.textContent = `${Math.round(playerX)}, ${Math.round(playerY)}`;
            if (mobCount) mobCount.textContent = mobs.length;
            if (fpsText) fpsText.textContent = fps;
            
            requestAnimationFrame(gameLoop);
        }
        
        // Iniciar game loop
        requestAnimationFrame(gameLoop);
        
        // Mensagem de boas-vindas
        addChatMessage(`🎮 ${currentCharacter.name} entrou no mundo de Eldoria!`, '#4CAF50');
        
        console.log('✅ Jogo iniciado com HUD funcional!');
    }
}
