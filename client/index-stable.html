<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eldoria - MMORPG de Browser</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="screen">
        <div class="login-container">
            <h1 class="login-title">⚔️ Eldoria</h1>
            <p class="login-subtitle">MMORPG de Browser</p>
            
            <!-- Formulário de Login -->
            <div class="login-form">
                <input type="text" id="username" class="form-input" placeholder="Nome de usuário">
                <input type="password" id="password" class="form-input" placeholder="Senha">
                <button id="loginBtn" class="login-button">🔑 Entrar</button>
                <button id="createAccountBtn" class="login-button create-account">👤 Criar Conta</button>
            </div>
            
            <!-- Mensagens -->
            <div id="loginMessage" class="message"></div>
        </div>
    </div>

    <!-- CHARACTER SCREEN -->
    <div id="characterScreen" class="screen">
        <div class="login-container">
            <h1 class="login-title">👥 Personagens</h1>
            <p class="login-subtitle">Selecione ou crie um personagem</p>
            
            <!-- Lista de Personagens -->
            <div id="characterList" class="character-list"></div>
            
            <!-- Botões -->
            <div class="character-buttons">
                <button id="createCharacterBtn" class="login-button">➕ Criar Personagem</button>
                <button id="enterWorldBtn" class="login-button">🌍 Entrar no Mundo</button>
                <button id="backToLoginBtn" class="login-button">🔙 Voltar</button>
            </div>
            
            <!-- Mensagens -->
            <div id="characterMessage" class="message"></div>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="gameScreen" class="screen">
        <div id="game-ui">
            <!-- Game Canvas -->
            <canvas id="gameCanvas"></canvas>
            
            <!-- HUD Principal -->
            <div class="ui-panel" style="position: absolute; top: 20px; left: 20px;">
                <div id="playerName">Player</div>
                <div id="playerLevel">Lv. 1</div>
                <div class="health-bar">
                    <div id="healthFill" class="health-fill" style="width: 100%;"></div>
                </div>
                <div id="hpText">100/100</div>
                <div id="positionText">400, 300</div>
                <div id="mobCount">0 mobs</div>
                <div id="fpsText">60 FPS</div>
            </div>
            
            <!-- Minimapa -->
            <div class="ui-panel" style="position: absolute; top: 20px; right: 20px;">
                <canvas id="minimap" width="150" height="150" style="border-radius: 5px;"></canvas>
            </div>
            
            <!-- Chat -->
            <div class="chat-container">
                <div id="chatMessages" class="chat-messages"></div>
                <div class="chat-input-container">
                    <input type="text" id="chatInput" class="chat-input" placeholder="Digite mensagem...">
                    <button id="chatSend" class="chat-send">Enviar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="ui/SimpleLoginManager.js"></script>
    <script src="network/NetworkManager.js"></script>
    <script src="GameplayEngine.js"></script>
    
    <script>
        // === CLEAN CLIENT GAME PIPELINE v2.0 ===
        
        class ClientGamePipeline {
            constructor() {
                this.loginManager = null;
                this.networkManager = null;
                this.gameplayEngine = null;
                this.worldData = null;
                this.isWorldInitialized = false;
                
                console.log('🚀 ClientGamePipeline v2.0 initialized');
            }
            
            // === STEP 1: LOAD UI ===
            loadUI() {
                console.log('📱 Loading UI...');
                
                // Inicializar SimpleLoginManager refatorado
                this.loginManager = new SimpleLoginManager();
                
                // Aguardar elementos DOM
                if (document.readyState === 'loading') {
                    document.addEventListener('DOMContentLoaded', () => this.initializeNetwork());
                } else {
                    this.initializeNetwork();
                }
            }
            
            // === STEP 2: INITIALIZE NETWORK ===
            initializeNetwork() {
                console.log('🌐 Initializing NetworkManager...');
                
                // Inicializar NetworkManager
                this.networkManager = new NetworkManager();
                
                // Configurar callbacks
                this.networkManager.on('login_success', (player) => this.onLoginSuccess(player));
                this.networkManager.on('login_error', (error) => this.onLoginError(error));
                this.networkManager.on('world_init', (worldData) => this.onWorldInit(worldData));
                
                // Aguardar login
                this.waitForLogin();
            }
            
            // === STEP 3: WAIT FOR LOGIN ===
            waitForLogin() {
                console.log('⏳ Waiting for login...');
                // UI já está visível, aguardar interação do usuário
            }
            
            // === NETWORK CALLBACKS ===
            onLoginSuccess(player) {
                console.log('✅ Login successful:', player);
                
                // Usar SessionManager do SimpleLoginManager
                this.loginManager.sessionManager.setCurrentUser(player);
                
                // Mostrar tela de personagens
                this.loginManager.loginUI.showCharacter();
            }
            
            onLoginError(error) {
                console.error('❌ Login error:', error);
                this.loginManager.loginUI.showMessage('error', error);
            }
            
            onWorldInit(worldData) {
                console.log('🌍 World initialized:', worldData);
                this.worldData = worldData;
                this.isWorldInitialized = true;
                
                // Inicializar GameplayEngine
                this.initializeGameplayEngine();
            }
            
            // === STEP 4: INITIALIZE GAMEPLAY ENGINE ===
            initializeGameplayEngine() {
                console.log('🎮 Initializing GameplayEngine...');
                
                if (!this.worldData) {
                    console.error('❌ Cannot initialize GameplayEngine: no world data');
                    return;
                }
                
                // Criar GameplayEngine
                this.gameplayEngine = new GameplayEngine();
                
                // Inicializar com dados do mundo - MÉTODO CORRETO
                const success = this.gameplayEngine.initializeWorld(this.worldData);
                
                if (success) {
                    console.log('✅ GameplayEngine initialized successfully');
                } else {
                    console.error('❌ Failed to initialize GameplayEngine');
                }
            }
            
            // === MÉTODO PARA ENTRAR NO MUNDO ===
            onEnterWorld(character) {
                console.log('🌍 Entering world with:', character.name);
                
                if (!this.networkManager) {
                    console.error('❌ NetworkManager not initialized');
                    return;
                }
                
                // Enviar requisição de entrada no mundo
                this.networkManager.enterWorld(character.id);
            }
        }
        
        // === INICIAR PIPELINE ===
        
        const pipeline = new ClientGamePipeline();
        pipeline.loadUI();
        
        // Configurar callback para entrada no mundo
        window.gamePipeline = pipeline;
        
        console.log('🎯 Client pipeline v2.0 ready');
    </script>
</body>
</html>
