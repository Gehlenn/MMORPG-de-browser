<!DOCTYPE html>
<html>
<head>
    <title>Test Login</title>
</head>
<body>
    <h1>Teste de Login</h1>
    <p>Abra o console para ver os logs.</p>
    
    <script>
        // Teste simples para verificar se o servidor está respondendo
        fetch('http://localhost:3000')
            .then(response => response.text())
            .then(html => {
                console.log('✅ Servidor respondendo');
                console.log('Status:', response.status);
                
                // Verificar se contém elementos esperados
                if (html.includes('loginScreen')) {
                    console.log('✅ loginScreen encontrado no HTML');
                } else {
                    console.log('❌ loginScreen NÃO encontrado no HTML');
                }
                
                if (html.includes('SimpleLoginManager')) {
                    console.log('✅ SimpleLoginManager referenciado');
                } else {
                    console.log('❌ SimpleLoginManager NÃO referenciado');
                }
            })
            .catch(error => {
                console.error('❌ Erro ao acessar servidor:', error);
            });
    </script>
</body>
</html>
